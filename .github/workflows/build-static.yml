# ──────────────────────────────────────────────────────────────
# Build lua-static for every platform combo and attach to the
# GitHub Release created by the tag push.
#
# Platforms:
#   linux-x86_64   — glibc-latest  (ubuntu:25.10 container, glibc 2.42)
#   linux-x86_64   — glibc-legacy  (centos:7 container, glibc 2.17)
#   linux-x86_64   — musl          (alpine 3.20, fully static)
#   linux-arm64    — glibc-latest  (ubuntu:25.10 container on arm runner, glibc 2.42)
#   linux-arm64    — glibc-legacy  (ubuntu:20.04 container on arm runner, glibc 2.31)
#   linux-arm64    — musl          (alpine 3.20 via docker on arm runner)
#   freebsd-x86_64 — FreeBSD 14.2  (vmactions/freebsd-vm)
#   macos-arm64    — Apple Silicon (macos-14)
#   macos-x86_64   — Intel Mac     (macos-15-intel)
#
# Trigger: push a tag matching v* (e.g. v1.0.0)
# ──────────────────────────────────────────────────────────────

name: Build Static Lua

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write          # needed to upload release assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ──────────────────────────────────
          # Ubuntu 25.10 (glibc 2.42) — no native runner, so
          # run as a container on ubuntu-24.04.
          # Minimal container needs extra packages vs. a full runner:
          # pkg-config for readline detection, libncurses-dev for
          # static linking, and file/ca-certificates for general use.
          - name:      linux-x86_64-glibc-latest
            runner:    ubuntu-24.04
            container: ubuntu:25.10
            docker_img: ""
            deps: >-
              apt-get update &&
              DEBIAN_FRONTEND=noninteractive
              apt-get install -y build-essential cmake wget libreadline-dev
              libncurses-dev pkg-config file ca-certificates python3 git
            makefile:  Makefile

          # CentOS 7 (glibc 2.17) — covers RHEL 7/8, old SLES, etc.
          # Uses docker_img path because centos:7's glibc 2.17 is too
          # old for the Node 20 runtime that actions/checkout@v4 needs.
          # GCC 4.8 lacks stdatomic.h, so we install devtoolset-11
          # (GCC 11) from the SCL repos (vault-fixed for EOL).
          # IMPORTANT: deps use double quotes (not single) because the
          # string is expanded inside sh -c '...' in the docker run step.
          - name:      linux-x86_64-glibc-legacy
            runner:    ubuntu-24.04
            container: ""
            docker_img: centos:7
            deps: >-
              sed -i "s/mirrorlist/#mirrorlist/g" /etc/yum.repos.d/CentOS-*.repo &&
              sed -i "s|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g" /etc/yum.repos.d/CentOS-*.repo &&
              yum install -y epel-release centos-release-scl &&
              sed -i -e "s/^mirrorlist/#mirrorlist/" -e "s|^[# ]*baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|" /etc/yum.repos.d/CentOS-SCL*.repo &&
              yum install -y devtoolset-11-gcc devtoolset-11-gcc-c++
              devtoolset-11-binutils make cmake3 wget readline-devel
              readline-static ncurses-devel ncurses-static glibc-static python3
              git &&
              ln -sf /usr/bin/cmake3 /usr/bin/cmake &&
              . /opt/rh/devtoolset-11/enable
            makefile:  Makefile

          - name:      linux-x86_64-musl
            runner:    ubuntu-24.04
            container: alpine:3.20
            docker_img: ""
            deps: >-
              apk add --no-cache build-base cmake wget readline-dev
              readline-static linux-headers python3 git
            makefile:  Makefile

          # ── Linux ARM64 ──────────────────────────────────
          - name:      linux-arm64-glibc-latest
            runner:    ubuntu-24.04-arm
            container: ubuntu:25.10
            docker_img: ""
            deps: >-
              apt-get update &&
              DEBIAN_FRONTEND=noninteractive
              apt-get install -y build-essential cmake wget libreadline-dev
              libncurses-dev pkg-config file ca-certificates python3 git
            makefile:  Makefile

          # Ubuntu 20.04 (glibc 2.31) for arm64 legacy.
          # devtoolset/SCL is x86_64-only, so we can't use centos:7 on
          # arm64 (GCC 4.8 lacks stdatomic.h). Ubuntu 20.04 gives us
          # GCC 9.4 and glibc 2.31, which is a reasonable arm64 floor
          # since RHEL 7 arm64 deployments are extremely rare in HPC.
          - name:      linux-arm64-glibc-legacy
            runner:    ubuntu-24.04-arm
            container: ubuntu:20.04
            docker_img: ""
            deps: >-
              apt-get update &&
              DEBIAN_FRONTEND=noninteractive
              apt-get install -y build-essential cmake wget libreadline-dev
              libncurses-dev python3 git
            makefile:  Makefile

          # JS actions (checkout, upload-artifact) can't run inside Alpine on
          # ARM64 — Node musl-arm64 binaries aren't bundled.  Checkout on the
          # host, then build inside Alpine via `docker run`.
          - name:      linux-arm64-musl
            runner:    ubuntu-24.04-arm
            container: ""
            docker_img: alpine:3.20
            deps: >-
              apk add --no-cache build-base cmake wget readline-dev
              readline-static linux-headers python3
            makefile:  Makefile

          # ── macOS ─────────────────────────────────────────
          - name:      macos-arm64
            runner:    macos-14
            container: ""
            docker_img: ""
            deps: >-
              brew install readline cmake python3
            makefile:  Makefile

          - name:      macos-x86_64
            runner:    macos-15-intel
            container: ""
            docker_img: ""
            deps: >-
              brew install readline cmake python3
            makefile:  Makefile

    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || '' }}

    env:
      PREFIX: ${{ github.workspace }}/lua-regolith

    steps:
      # ── 0. Dependencies ──────────────────────────────────
      - name: Install build dependencies
        if: ${{ !matrix.docker_img }}
        run: ${{ matrix.deps }}

      # ── 1. Source ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. macOS readline hint ────────────────────────────
      # Homebrew doesn't link readline into the default search path because it
      # shadows libedit. Export the paths so the Makefile finds it.
      - name: Export readline paths (macOS)
        if: runner.os == 'macOS'
        run: |
          READLINE_PREFIX="$(brew --prefix readline)"
          {
            echo "CFLAGS=-I${READLINE_PREFIX}/include"
            echo "LDFLAGS=-L${READLINE_PREFIX}/lib"
          } >> "$GITHUB_ENV"

      # ────────────────────────────────────────────────────
      #  Standard path (native or GitHub-managed container)
      # ────────────────────────────────────────────────────
      - name: Download sources
        if: ${{ !matrix.docker_img }}
        run: make -f ${{ matrix.makefile }} download

      - name: Build all modules
        if: ${{ !matrix.docker_img }}
        run: make -f ${{ matrix.makefile }} PREFIX="$PREFIX" RELOCATABLE=1 all

      - name: Build static interpreter
        if: ${{ !matrix.docker_img }}
        run: make -f ${{ matrix.makefile }} PREFIX="$PREFIX" RELOCATABLE=1 static-lua

      - name: Install
        if: ${{ !matrix.docker_img }}
        run: make -f ${{ matrix.makefile }} PREFIX="$PREFIX" RELOCATABLE=1 install

      - name: Run smoke tests
        if: ${{ !matrix.docker_img }}
        env:
          LUA_PATH: ${{ github.workspace }}/lua-regolith/share/lua/5.4/?.lua;;
        run: make -f ${{ matrix.makefile }} PREFIX="$PREFIX" test

      # ────────────────────────────────────────────────────
      #  Docker path (Alpine musl + CentOS 7 legacy)
      #  Checkout happens on the host; build runs inside the
      #  container with the workspace bind-mounted.
      #  NOTE: deps are expanded inside sh -c '...', so they
      #  must NOT contain single quotes — use double quotes.
      # ────────────────────────────────────────────────────
      - name: Build inside Docker container
        if: ${{ matrix.docker_img }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":"${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -e CI=true \
            -e PREFIX="${{ github.workspace }}/lua-regolith" \
            -e LUA_PATH="${{ github.workspace }}/lua-regolith/share/lua/5.4/?.lua;;" \
            "${{ matrix.docker_img }}" \
            sh -c '
              set -eux
              ${{ matrix.deps }}
              make -f ${{ matrix.makefile }} download
              make -f ${{ matrix.makefile }} PREFIX="$PREFIX" RELOCATABLE=1 all
              make -f ${{ matrix.makefile }} PREFIX="$PREFIX" RELOCATABLE=1 static-lua
              make -f ${{ matrix.makefile }} PREFIX="$PREFIX" RELOCATABLE=1 install
              make -f ${{ matrix.makefile }} PREFIX="$PREFIX" test
            '

      # ── Verify ────────────────────────────────────────────
      - name: Verify lua-static runs
        run: |
          echo "--- binary info ---"
          file "$PREFIX/bin/lua-static" || true
          echo "--- version ---"
          "$PREFIX/bin/lua-static" -v
          echo "--- quick self-test ---"
          "$PREFIX/bin/lua-static" -e 'print("hello from lua-static")'

      # ── Package ───────────────────────────────────────────
      - name: Create tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="lua-regolith-${TAG}-${{ matrix.name }}.tar.gz"
          tar -czf "${GITHUB_WORKSPACE}/${ARCHIVE}" -C "$PREFIX" .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ARCHIVE }}
          retention-days: 5

  # ────────────────────────────────────────────────────────────
  # FreeBSD — runs in a VM via vmactions/freebsd-vm
  #
  # This can't use the matrix because the VM action has its own
  # prepare/run structure.  FreeBSD uses `gmake` for GNU Make.
  # ────────────────────────────────────────────────────────────
  build-freebsd:
    runs-on: ubuntu-latest
    env:
      PREFIX: ${{ github.workspace }}/lua-regolith

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          copyback: true
          envs: 'PREFIX'
          prepare: |
            pkg install -y gmake wget readline
          run: |
            set -eux
            export CI=true
            export LUA_PATH="$PREFIX/share/lua/5.4/?.lua;;"
            export C_INCLUDE_PATH=/usr/local/include
            export LIBRARY_PATH=/usr/local/lib

            gmake -f Makefile.lite download
            gmake -f Makefile.lite PREFIX="$PREFIX" RELOCATABLE=1 all
            gmake -f Makefile.lite PREFIX="$PREFIX" RELOCATABLE=1 static-lua
            gmake -f Makefile.lite PREFIX="$PREFIX" RELOCATABLE=1 install
            gmake -f Makefile.lite PREFIX="$PREFIX" test

            echo "--- binary info ---"
            file "$PREFIX/bin/lua-static" || true
            "$PREFIX/bin/lua-static" -v
            "$PREFIX/bin/lua-static" -e 'print("hello from lua-static")'

      - name: Create tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="lua-regolith-${TAG}-freebsd-x86_64.tar.gz"
          tar -czf "${GITHUB_WORKSPACE}/${ARCHIVE}" -C "$PREFIX" .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-x86_64
          path: ${{ env.ARCHIVE }}
          retention-days: 5

  # ────────────────────────────────────────────────────────────
  # Collect every tarball and attach them to the GitHub Release
  # ────────────────────────────────────────────────────────────
  release:
    needs: [build, build-freebsd]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach assets to release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: artifacts/**/*.tar.gz
